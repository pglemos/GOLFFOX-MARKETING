name: Vercel Preview

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: vercel-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Vercel secrets
        id: secrets
        shell: bash
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Vercel secrets are not configured. Skipping preview deploy."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Vercel CLI
        if: steps.secrets.outputs.configured == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        if: steps.secrets.outputs.configured == 'true'
        run: vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build with Vercel
        if: steps.secrets.outputs.configured == 'true'
        run: vercel build --token="$VERCEL_TOKEN"

      - name: Deploy preview
        if: steps.secrets.outputs.configured == 'true'
        id: deploy
        run: |
          url="$(vercel deploy --prebuilt --yes --token="$VERCEL_TOKEN" --archive=tgz)"
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL
        if: steps.secrets.outputs.configured == 'true'
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.url }}
        with:
          script: |
            const marker = '<!-- golffox-marketing-vercel-preview -->'
            const body = `${marker}\nPreview Vercel: ${process.env.DEPLOYMENT_URL}`
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            })
            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            )
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }
